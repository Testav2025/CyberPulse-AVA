openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CyberPulse AVA API - Enterprise Cybersecurity Companion Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: cyberscore
    description: CyberScore and security posture
  - name: devices
    description: Device compliance
  - name: alerts
    description: Security alerts
  - name: darktrace
    description: Darktrace threat intelligence
  - name: pentera
    description: Pentera risk assessment
  - name: training
    description: Security learning hub
  - name: assistant
    description: AI security assistant
  - name: notifications
    description: Teams notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── User Profile ───────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateCurrentUser
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ─── CyberScore ─────────────────────────────────────────────────────────────
  /cyberscore:
    get:
      operationId: getCyberScore
      tags: [cyberscore]
      summary: Get personalised CyberScore and component breakdown
      responses:
        "200":
          description: CyberScore with breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CyberScore"

  /cyberscore/history:
    get:
      operationId: getCyberScoreHistory
      tags: [cyberscore]
      summary: Get CyberScore history over time
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: CyberScore history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CyberScoreHistoryEntry"

  /cyberscore/summary:
    get:
      operationId: getSecuritySummary
      tags: [cyberscore]
      summary: Get dashboard security summary with all key metrics
      responses:
        "200":
          description: Aggregated security summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritySummary"

  # ─── Devices ─────────────────────────────────────────────────────────────────
  /devices:
    get:
      operationId: getDevices
      tags: [devices]
      summary: List all managed devices with compliance status
      parameters:
        - name: complianceState
          in: query
          schema:
            type: string
            enum: [compliant, noncompliant, unknown, all]
            default: all
        - name: platform
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of managed devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"

  /devices/{id}:
    get:
      operationId: getDevice
      tags: [devices]
      summary: Get device details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          description: Device not found

  /devices/compliance-summary:
    get:
      operationId: getComplianceSummary
      tags: [devices]
      summary: Get device compliance counts grouped by state and platform
      responses:
        "200":
          description: Compliance summary breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceSummary"

  # ─── Security Alerts ─────────────────────────────────────────────────────────
  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Get security alert feed
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, informational, all]
            default: all
        - name: status
          in: query
          schema:
            type: string
            enum: [active, resolved, dismissed, all]
            default: active
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Security alert feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecurityAlert"

  /alerts/{id}:
    get:
      operationId: getAlert
      tags: [alerts]
      summary: Get alert details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alert detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityAlert"
        "404":
          description: Alert not found

  /alerts/{id}/status:
    patch:
      operationId: updateAlertStatus
      tags: [alerts]
      summary: Update alert status (resolve or dismiss)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertStatusUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityAlert"
        "404":
          description: Alert not found

  /alerts/recent:
    get:
      operationId: getRecentAlerts
      tags: [alerts]
      summary: Get most recent 5 alerts for dashboard widget
      responses:
        "200":
          description: Recent alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecurityAlert"

  # ─── Darktrace ───────────────────────────────────────────────────────────────
  /darktrace/summary:
    get:
      operationId: getDarktraceSummary
      tags: [darktrace]
      summary: Get Darktrace threat intelligence summary
      responses:
        "200":
          description: Darktrace summary widget data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DarktraceSummary"

  /darktrace/incidents:
    get:
      operationId: getDarktraceIncidents
      tags: [darktrace]
      summary: List Darktrace AI-detected incidents
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Darktrace incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DarktraceIncident"

  # ─── Pentera ─────────────────────────────────────────────────────────────────
  /pentera/summary:
    get:
      operationId: getPenteraSummary
      tags: [pentera]
      summary: Get Pentera risk assessment summary
      responses:
        "200":
          description: Pentera risk summary widget data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PenteraSummary"

  /pentera/findings:
    get:
      operationId: getPenteraFindings
      tags: [pentera]
      summary: List Pentera penetration test findings
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, all]
            default: all
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Pentera findings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PenteraFinding"

  # ─── Training / Learning Hub ─────────────────────────────────────────────────
  /training/modules:
    get:
      operationId: getTrainingModules
      tags: [training]
      summary: List available security training modules
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [all, not_started, in_progress, completed]
            default: all
      responses:
        "200":
          description: Training modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingModule"

  /training/modules/{id}:
    get:
      operationId: getTrainingModule
      tags: [training]
      summary: Get training module details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Training module detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModule"

  /training/progress:
    get:
      operationId: getTrainingProgress
      tags: [training]
      summary: Get user training progress summary
      responses:
        "200":
          description: Training progress summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingProgress"

  /training/modules/{id}/enroll:
    post:
      operationId: enrollTrainingModule
      tags: [training]
      summary: Enroll in or start a training module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enrollment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingEnrollment"

  /training/modules/{id}/complete:
    post:
      operationId: completeTrainingModule
      tags: [training]
      summary: Mark a training module as complete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Completion record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingEnrollment"

  /training/leaderboard:
    get:
      operationId: getTrainingLeaderboard
      tags: [training]
      summary: Get top training achievers leaderboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # ─── AI Security Assistant ───────────────────────────────────────────────────
  /assistant/chat:
    post:
      operationId: sendAssistantMessage
      tags: [assistant]
      summary: Send a message to the AI Security Assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantMessageInput"
      responses:
        "200":
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantResponse"

  /assistant/history:
    get:
      operationId: getAssistantHistory
      tags: [assistant]
      summary: Get chat history with the AI Security Assistant
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssistantMessage"

  # ─── Teams Notifications ─────────────────────────────────────────────────────
  /notifications/preferences:
    get:
      operationId: getNotificationPreferences
      tags: [notifications]
      summary: Get Teams notification preferences
      responses:
        "200":
          description: Notification preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"
    put:
      operationId: updateNotificationPreferences
      tags: [notifications]
      summary: Update Teams notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferences"
      responses:
        "200":
          description: Updated notification preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── User ──────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, displayName, email, role, department, avatarUrl, createdAt]
      properties:
        id:
          type: string
        displayName:
          type: string
        email:
          type: string
        role:
          type: string
        department:
          type: string
        avatarUrl:
          type: ["string", "null"]
        jobTitle:
          type: ["string", "null"]
        theme:
          type: string
          enum: [light, dark, system]
        teamsWebhookUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
        theme:
          type: string
          enum: [light, dark, system]
        teamsWebhookUrl:
          type: ["string", "null"]

    # ─── CyberScore ────────────────────────────────────────────────────────────
    CyberScore:
      type: object
      required: [userId, overallScore, grade, identityScore, deviceScore, trainingScore, riskScore, lastCalculated]
      properties:
        userId:
          type: string
        overallScore:
          type: integer
          description: 0-100
        grade:
          type: string
          enum: [A, B, C, D, F]
        identityScore:
          type: integer
          description: Identity security score 0-100
        deviceScore:
          type: integer
          description: Device compliance score 0-100
        trainingScore:
          type: integer
          description: Security training completion score 0-100
        riskScore:
          type: integer
          description: Detected risk exposure score 0-100
        trend:
          type: string
          enum: [improving, stable, declining]
        lastCalculated:
          type: string

    CyberScoreHistoryEntry:
      type: object
      required: [date, score, grade]
      properties:
        date:
          type: string
        score:
          type: integer
        grade:
          type: string

    SecuritySummary:
      type: object
      required: [cyberScore, activeAlerts, compliantDevices, totalDevices, trainingCompletion, criticalFindings, lastUpdated]
      properties:
        cyberScore:
          type: integer
        cyberScoreGrade:
          type: string
        cyberScoreTrend:
          type: string
        activeAlerts:
          type: integer
        criticalAlerts:
          type: integer
        highAlerts:
          type: integer
        compliantDevices:
          type: integer
        totalDevices:
          type: integer
        trainingCompletion:
          type: integer
          description: Percentage 0-100
        criticalFindings:
          type: integer
        darktraceThreatScore:
          type: ["integer", "null"]
        penteraRiskScore:
          type: ["integer", "null"]
        lastUpdated:
          type: string

    # ─── Devices ───────────────────────────────────────────────────────────────
    Device:
      type: object
      required: [id, deviceName, platform, osVersion, complianceState, lastSyncDateTime, userId, userDisplayName]
      properties:
        id:
          type: string
        deviceName:
          type: string
        platform:
          type: string
        osVersion:
          type: string
        complianceState:
          type: string
          enum: [compliant, noncompliant, unknown, inGracePeriod]
        lastSyncDateTime:
          type: string
        userId:
          type: string
        userDisplayName:
          type: string
        userEmail:
          type: string
        managedBy:
          type: string
        encryptionEnabled:
          type: boolean
        firewallEnabled:
          type: boolean
        antivirusEnabled:
          type: boolean
        osUpdateStatus:
          type: string
          enum: [upToDate, updateAvailable, updateRequired, unknown]
        nonComplianceReasons:
          type: array
          items:
            type: string

    ComplianceSummary:
      type: object
      required: [total, compliant, noncompliant, unknown, byPlatform]
      properties:
        total:
          type: integer
        compliant:
          type: integer
        noncompliant:
          type: integer
        unknown:
          type: integer
        inGracePeriod:
          type: integer
        complianceRate:
          type: number
          description: Percentage 0-100
        byPlatform:
          type: array
          items:
            $ref: "#/components/schemas/PlatformComplianceCount"

    PlatformComplianceCount:
      type: object
      required: [platform, total, compliant, noncompliant]
      properties:
        platform:
          type: string
        total:
          type: integer
        compliant:
          type: integer
        noncompliant:
          type: integer

    # ─── Security Alerts ───────────────────────────────────────────────────────
    SecurityAlert:
      type: object
      required: [id, title, severity, status, source, category, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        severity:
          type: string
          enum: [critical, high, medium, low, informational]
        status:
          type: string
          enum: [active, resolved, dismissed]
        source:
          type: string
          enum: [defender, entra, intune, darktrace, pentera, manual]
        category:
          type: string
        affectedEntity:
          type: ["string", "null"]
        remediationSteps:
          type: ["string", "null"]
        createdAt:
          type: string
        resolvedAt:
          type: ["string", "null"]

    AlertStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [resolved, dismissed]
        resolutionNote:
          type: string

    # ─── Darktrace ─────────────────────────────────────────────────────────────
    DarktraceSummary:
      type: object
      required: [threatScore, activeIncidents, modelBreaches, anomalousDevices, lastUpdated]
      properties:
        threatScore:
          type: integer
          description: Overall threat score 0-100
        activeIncidents:
          type: integer
        modelBreaches:
          type: integer
        anomalousDevices:
          type: integer
        criticalBreaches:
          type: integer
        highBreaches:
          type: integer
        trend:
          type: string
          enum: [improving, stable, deteriorating]
        lastUpdated:
          type: string

    DarktraceIncident:
      type: object
      required: [id, title, score, category, deviceHostname, createdAt, status]
      properties:
        id:
          type: string
        title:
          type: string
        score:
          type: number
          description: AI confidence score 0-100
        category:
          type: string
        deviceHostname:
          type: string
        deviceIp:
          type: ["string", "null"]
        createdAt:
          type: string
        status:
          type: string
          enum: [active, acknowledged, resolved]
        mitreTactics:
          type: array
          items:
            type: string

    # ─── Pentera ───────────────────────────────────────────────────────────────
    PenteraSummary:
      type: object
      required: [riskScore, totalFindings, criticalFindings, highFindings, mediumFindings, lowFindings, lastAssessment]
      properties:
        riskScore:
          type: integer
          description: Overall risk score 0-100
        totalFindings:
          type: integer
        criticalFindings:
          type: integer
        highFindings:
          type: integer
        mediumFindings:
          type: integer
        lowFindings:
          type: integer
        attackSurface:
          type: string
          enum: [low, medium, high, critical]
        remediatedSinceLastScan:
          type: integer
        lastAssessment:
          type: string

    PenteraFinding:
      type: object
      required: [id, title, severity, category, status, discoveredAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        severity:
          type: string
          enum: [critical, high, medium, low]
        category:
          type: string
        cvssScore:
          type: ["number", "null"]
        affectedSystem:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, remediated, accepted_risk]
        remediationGuidance:
          type: ["string", "null"]
        discoveredAt:
          type: string

    # ─── Training ──────────────────────────────────────────────────────────────
    TrainingModule:
      type: object
      required: [id, title, category, durationMinutes, difficulty, status, completionRate]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        durationMinutes:
          type: integer
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        status:
          type: string
          enum: [not_started, in_progress, completed]
        completionRate:
          type: integer
          description: Global completion rate percentage
        userProgress:
          type: ["integer", "null"]
          description: User progress percentage 0-100
        scoreContribution:
          type: integer
          description: Points this module contributes to CyberScore
        tags:
          type: array
          items:
            type: string
        isMandatory:
          type: boolean
        dueDate:
          type: ["string", "null"]

    TrainingProgress:
      type: object
      required: [completed, inProgress, notStarted, total, completionPercentage, totalPoints, currentStreak]
      properties:
        completed:
          type: integer
        inProgress:
          type: integer
        notStarted:
          type: integer
        total:
          type: integer
        completionPercentage:
          type: integer
        totalPoints:
          type: integer
        currentStreak:
          type: integer
          description: Days in a row with learning activity
        mandatoryCompleted:
          type: integer
        mandatoryTotal:
          type: integer

    TrainingEnrollment:
      type: object
      required: [moduleId, userId, status, enrolledAt]
      properties:
        moduleId:
          type: string
        userId:
          type: string
        status:
          type: string
          enum: [enrolled, in_progress, completed]
        progress:
          type: integer
        enrolledAt:
          type: string
        completedAt:
          type: ["string", "null"]

    LeaderboardEntry:
      type: object
      required: [rank, userId, displayName, department, totalPoints, completedModules]
      properties:
        rank:
          type: integer
        userId:
          type: string
        displayName:
          type: string
        department:
          type: string
        avatarUrl:
          type: ["string", "null"]
        totalPoints:
          type: integer
        completedModules:
          type: integer

    # ─── AI Assistant ──────────────────────────────────────────────────────────
    AssistantMessageInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
        context:
          type: string
          enum: [general, alerts, devices, training, score]

    AssistantMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string

    AssistantResponse:
      type: object
      required: [message, suggestedActions]
      properties:
        message:
          $ref: "#/components/schemas/AssistantMessage"
        suggestedActions:
          type: array
          items:
            type: string

    # ─── Notifications ────────────────────────────────────────────────────────
    NotificationPreferences:
      type: object
      required: [teamsEnabled, alertsEnabled, scoreChangesEnabled, weeklyDigestEnabled]
      properties:
        teamsEnabled:
          type: boolean
        teamsWebhookUrl:
          type: ["string", "null"]
        alertsEnabled:
          type: boolean
        alertMinSeverity:
          type: string
          enum: [critical, high, medium, low]
        scoreChangesEnabled:
          type: boolean
        weeklyDigestEnabled:
          type: boolean
        weeklyDigestDay:
          type: string
          enum: [monday, tuesday, wednesday, thursday, friday]
